# Convex self-hosted backend + dashboard.
# Docs: https://github.com/get-convex/convex-backend/tree/main/self-hosted
#
# Endpoints once up:
#   - Backend API:        http://localhost:3210
#   - Streaming Export:   http://localhost:3210/api/streaming_export/...
#   - HTTP Actions:       http://localhost:3211
#   - Dashboard:          http://localhost:6791

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: notchat-convex-backend
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - ./convex-backend-data:/convex/data
      # Volumen para el archivo .duckdb que escribe el componente
      # convex-sync-motherduck en modo `duckdb_local`. La carpeta del host
      # ./data/duckdb se monta como /data adentro del contenedor; el config
      # del componente apunta a /data/local.duckdb (ver .env.example).
      - ./data/duckdb:/data
    environment:
      - INSTANCE_NAME=notchat-local
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=false
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: notchat-convex-dashboard
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

  next:
    image: oven/bun:latest
    container_name: notchat-next
    working_dir: /app
    volumes:
      - .:/app
      # Volumen nombrado para los node_modules dentro del contenedor Linux.
      # Sin esto, los binarios nativos del host Windows (o Mac) colisionan con
      # los binarios Linux que bun instala adentro del contenedor.
      - next_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      # El frontend se conecta al backend a través del host, no del container network.
      - NEXT_PUBLIC_CONVEX_URL=http://localhost:3210
    command: sh -c "bun install && bun run --cwd apps/demo dev --hostname 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  next_node_modules:
